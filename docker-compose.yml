services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quant_core}
      POSTGRES_USER: ${POSTGRES_USER:-quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quant}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quant} -d ${POSTGRES_DB:-quant_core}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: python:3.12-slim
    profiles: ["app"]
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      APP_ENV: ${APP_ENV:-dev}
      TZ: ${TZ:-UTC}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://quant:quant@postgres:5432/quant_core}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["bash", "-lc", "python --version && sleep infinity"]

volumes:
  postgres-data:

